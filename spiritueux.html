<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   CSS VARIABLES
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
:root {
  --gold: #D4AF37;
  --gold-light: #F0D060;
  --gold-dark: #B8942E;
  --gold-glow: rgba(212, 175, 55, 0.3);
  --gold-subtle: rgba(212, 175, 55, 0.08);
  --font-display: 'Playfair Display', serif;
  --font-sans: 'Inter', sans-serif;
  --nav-height: 72px;
  --section-gap: 80px;
}

[data-theme="dark"] {
  --bg-primary: #0A0A0A;
  --bg-secondary: #111111;
  --bg-card: #1A1A1A;
  --bg-card-hover: #222222;
  --text-primary: #F0EDE8;
  --text-secondary: #A0988A;
  --text-muted: #6B6360;
  --border-light: rgba(212, 175, 55, 0.12);
  --nav-bg: rgba(10, 10, 10, 0.85);
  --shadow-card: 0 20px 60px rgba(0,0,0,0.3);
}

[data-theme="light"] {
  --bg-primary: #F8F6F2;
  --bg-secondary: #EFECE6;
  --bg-card: #FFFFFF;
  --bg-card-hover: #FAFAFA;
  --text-primary: #1A1814;
  --text-secondary: #5C5548;
  --text-muted: #9C948C;
  --border-light: rgba(212, 175, 55, 0.15);
  --nav-bg: rgba(248, 246, 242, 0.9);
  --shadow-card: 0 20px 60px rgba(0,0,0,0.08);
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   RESET & BASE
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--gold) var(--bg-primary); }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
  padding-top: var(--nav-height);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
a { color: var(--gold); text-decoration: none; transition: color 0.3s; }
a:hover { color: var(--gold-light); }
::selection { background: var(--gold); color: #000; }

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   NAVIGATION (Injected by nav.js)
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  height: var(--nav-height);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  background: var(--nav-bg);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s, background 0.4s;
}
.site-nav.scrolled { border-bottom-color: var(--border-light); }
.nav-inner {
  max-width: 1280px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.nav-logo .diamond {
  width: 10px; height: 10px;
  background: var(--gold);
  transform: rotate(45deg);
  display: inline-block;
  transition: transform 0.6s;
}
.nav-logo:hover .diamond { transform: rotate(135deg) scale(1.2); }
.nav-logo-img {
  width: 28px;
  height: 28px;
  object-fit: contain;
  border-radius: 4px;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: 8px;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.nav-links a:hover,
.nav-links a.active {
  color: var(--gold);
  background: var(--gold-subtle);
}
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 8px;
  z-index: 1001;
}
.theme-toggle {
  background: none;
  border: 1px solid var(--border-light);
  color: var(--text-muted);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 0.9rem;
}
.theme-toggle:hover {
  color: var(--gold);
  border-color: var(--gold);
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   PAGE HERO
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.page-hero {
  text-align: center;
  padding: 100px 24px 60px;
  position: relative;
}
.page-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 80px;
  background: linear-gradient(to bottom, var(--gold), transparent);
}
.page-hero h1 {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(212, 175, 55, 0.15);
}
.page-hero p {
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.8;
}
.page-hero .hero-icon {
  font-size: 3rem;
  color: var(--gold);
  margin-bottom: 24px;
  opacity: 0.7;
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   FILTER BAR
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.filter-bar {
  max-width: 1280px;
  margin: 0 auto 40px;
  padding: 0 24px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}
.filter-btn {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 10px 24px;
  border-radius: 50px;
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
  cursor: pointer;
  transition: all 0.3s;
}
.filter-btn:hover,
.filter-btn.active {
  background: var(--gold);
  color: #000;
  border-color: var(--gold);
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   PRODUCTS GRID
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.products-section {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 100px;
}
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* в”Ђв”Ђв”Ђ Section Divider в”Ђв”Ђв”Ђ */
.section-divider {
  grid-column: 1 / -1;
  padding: 32px 0 16px;
  margin-bottom: 8px;
  position: relative;
}
.section-divider::before {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.section-divider h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--gold);
  text-align: center;
  background: var(--bg-primary);
  padding: 0 20px;
  position: relative;
  z-index: 2;
  display: inline-block;
  left: 50%;
  transform: translateX(-50%);
}
.section-divider .subtitle {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
  margin-top: 4px;
}

/* в”Ђв”Ђв”Ђ Product Card в”Ђв”Ђв”Ђ */
.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.4s;
  cursor: pointer;
  position: relative;
}
.product-card:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 30px var(--gold-glow);
  background: var(--bg-card-hover);
}
.product-badge {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 5;
  padding: 5px 14px;
  background: var(--gold);
  color: #000;
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
}
.product-image {
  width: 100%;
  height: 220px;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: var(--bg-secondary);
  transition: transform 0.5s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-card:hover .product-image { transform: scale(1.03); }
.product-image-placeholder {
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
}
.product-image-placeholder i {
  font-size: 4rem;
  color: var(--gold);
  opacity: 0.4;
  transition: all 0.4s;
}
.product-card:hover .product-image-placeholder i {
  opacity: 0.9;
  transform: scale(1.1);
}
.product-body {
  padding: 20px;
}
.product-body .product-brand {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold);
  margin-bottom: 6px;
  font-weight: 600;
}
.product-body h3 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.product-body p {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}
.product-body .product-origin {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.product-body .product-origin i {
  margin-right: 4px;
  color: var(--gold);
  font-size: 0.7rem;
}
.product-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.product-footer .product-price {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--gold);
}
.product-footer .product-format {
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   MODAL
   в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  z-index: 2000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  animation: modalFadeIn 0.3s;
}
.modal-overlay.active { display: flex; }
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--bg-secondary);
  border-radius: 20px;
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border-light);
  box-shadow: 0 40px 120px rgba(0,0,0,0.6);
  animation: modalSlideIn 0.3s;
  position: relative;
}
@keyframes modalSlideIn {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  z-index: 10;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border-light);
  background: rgba(10,10,10,0.7);
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.modal-close:hover {
  background: var(--gold);
  color: #000;
  border-color: var(--gold);
}
.modal-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.modal-img {
  min-height: 350px;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: var(--bg-primary);
  border-radius: 20px 0 0 20px;
}
.modal-img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
}
.modal-img-placeholder i {
  font-size: 5rem;
  color: var(--text-muted);
  opacity: 0.3;
}
.modal-info {
  padding: 32px;
}
.modal-brand {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  font-weight: 600;
}
.modal-name {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
  margin: 8px 0 16px;
  line-height: 1.2;
}
.modal-desc {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.7;
  margin-bottom: 20px;
}
.modal-details {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.modal-detail {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.modal-detail i {
  width: 20px;
  color: var(--gold);
  font-size: 0.8rem;
}
.modal-detail strong { color: var(--text-primary); }
.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.modal-tag {
  padding: 4px 14px;
  border-radius: 50px;
  border: 1px solid var(--border-light);
  font-size: 0.72rem;
  color: var(--text-muted);
}
.modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 20px;
  border-top: 1px solid var(--border-light);
}
.modal-price {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--gold);
}
.modal-contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--gold);
  color: #000;
  border: none;

// ADMIN BRIDGE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// RENDER FUNCTIONS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

function getProductImage(p) {
  if (p.image) return p.image;
  return null;
}

function renderProducts(filter) {
  const grid = document.getElementById('productGrid');
  if (!grid) return;

  let filtered = spirits;
  if (filter && filter !== 'all') {
    filtered = spirits.filter(p => p.region === filter);
  }

  // Group by region
  const groups = {};
  const regionNames = {
    jw: { label: 'рџҐѓ Johnnie Walker вЂ” Г‰cosse', subtitle: 'Blended Scotch Whisky de renommГ©e mondiale' },
    grants: { label: 'рџҐѓ Grant\'s вЂ” Г‰cosse', subtitle: 'Triple Wood Blended Scotch Whisky' },
    irish: { label: 'рџ‡®рџ‡Є Baroneys вЂ” Irlande', subtitle: 'Irish Cream Liqueur' },
    vodka: { label: 'рџ‡ёрџ‡° Nicolaus Vodka вЂ” Slovaquie', subtitle: 'Vodka premium et saveurs exquises' },
    whisky: { label: 'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї Whiskies Divers вЂ” Г‰cosse', subtitle: 'Blended et single malts d\'exception' }
  };

  filtered.forEach(p => {
    if (!groups[p.region]) groups[p.region] = [];
    groups[p.region].push(p);
  });

  let html = '';

  if (filter && filter !== 'all') {
    const cat = filter;
    const info = regionNames[cat];
    if (info) {
      html += '<div class="section-divider"><h2>' + info.label + '</h2><div class="subtitle">' + info.subtitle + '</div></div>';
    }
    if (groups[cat]) {
      groups[cat].forEach(p => { html += renderCard(p); });
    }
  } else {
    const order = ['jw', 'grants', 'irish', 'vodka', 'whisky'];
    order.forEach(cat => {
      if (!groups[cat] || groups[cat].length === 0) return;
      const info = regionNames[cat];
      if (info) {
        html += '<div class="section-divider"><h2>' + info.label + '</h2><div class="subtitle">' + info.subtitle + '</div></div>';
      }
      groups[cat].forEach(p => { html += renderCard(p); });
    });
  }

  grid.innerHTML = html;
}

function renderCard(p) {
  const img = p.image
    ? 'style="background-image:url(\'' + p.image + '\')"'
    : '';
  const imgClass = p.image ? 'product-image' : 'product-image product-image-placeholder';
  const imgContent = p.image ? '' : '<i class="fas fa-wine-glass-alt"></i>';

  const badge = p.tag ? '<div class="product-badge">' + p.tag + '</div>' : '';
  const priceDisplay = p.price || 'Sur demande';

  return '<div class="product-card" onclick="openModal(\'' + p.id + '\')">'
    + badge
    + '<div class="' + imgClass + '" ' + img + '>' + imgContent + '</div>'
    + '<div class="product-body">'
    + '<div class="product-brand">' + p.brand + '</div>'
    + '<h3>' + p.name + '</h3>'
    + '<p>' + p.description + '</p>'
    + '<div class="product-origin"><i class="fas fa-globe-africa"></i> ' + p.origin + '</div>'
    + '</div>'
    + '<div class="product-footer">'
    + '<span class="product-price">' + priceDisplay + '</span>'
    + '<span class="product-format">' + p.format + '</span>'
    + '</div>'
    + '</div>';
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// MODAL
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

function openModal(id) {
  const p = spirits.find(x => x.id === id);
  if (!p) return;

  const modal = document.getElementById('productModal');
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';

  document.getElementById('modalBrand').textContent = p.brand;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.description;

  // Details
  const details = document.getElementById('modalDetails');
  details.innerHTML = ''
    + '<div class="modal-detail"><i class="fas fa-map-marker-alt"></i> <strong>Origine :</strong> ' + p.origin + '</div>'
    + '<div class="modal-detail"><i class="fas fa-box"></i> <strong>Format :</strong> ' + p.format + '</div>'
    + '<div class="modal-detail"><i class="fas fa-tag"></i> <strong>Marque :</strong> ' + p.brand + '</div>';

  // Tags
  const tagsEl = document.getElementById('modalTags');
  let tagsHtml = p.features.map(function(f) {
    return '<span class="modal-tag">' + f + '</span>';
  }).join('');
  if (p.tag) {
    tagsHtml += '<span class="modal-tag" style="border-color:var(--gold);color:var(--gold);">' + p.tag + '</span>';
  }
  tagsEl.innerHTML = tagsHtml;

  // Price
  document.getElementById('modalPrice').textContent = p.price || 'Sur demande';

  // Image
  const imgEl = document.getElementById('modalImg');
  if (p.image) {
    imgEl.className = 'modal-img';
    imgEl.style.backgroundImage = "url('" + p.image + "')";
    imgEl.innerHTML = '';
  } else {
    imgEl.className = 'modal-img modal-img-placeholder';
    imgEl.style.backgroundImage = '';
    imgEl.innerHTML = '<i class="fas fa-wine-glass-alt"></i>';
  }
}

function closeModal() {
  document.getElementById('productModal').classList.remove('active');
  document.body.style.overflow = '';
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// EVENT LISTENERS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

document.addEventListener('DOMContentLoaded', function() {
  renderProducts('all');

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      this.classList.add('active');
      renderProducts(this.getAttribute('data-filter'));
    });
  });

  // Modal close
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
});
</script>
