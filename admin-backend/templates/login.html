<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Viva E-Market Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .login-card h1 {
      color: #d4a853;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-card p {
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.8);
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #d4a853;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #d4a853, #b8943e);
      color: #0a0a1a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(212,168,83,0.3);
    }
    .error {
      background: rgba(255,70,70,0.15);
      border: 1px solid rgba(255,70,70,0.3);
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      text-align: center;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo i {
      font-size: 2.5rem;
      color: #d4a853;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <i class="fas fa-store"></i>
    </div>
    <h1>Espace Administrateur</h1>
    <p>Viva E-Market — Back Office</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required autofocus>
      </div>
      <button type="submit" class="btn">
        <i class="fas fa-lock-open"></i> Se connecter
      </button>
    </form>
  </div>
</body>
</html>
